  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const XLSX = window.XLSX;

    const useFirebase = () => {
      const [ready, setReady] = useState(!!window.__db);
      useEffect(() => {
        if (window.__db) { setReady(true); return; }
        const h = () => setReady(true);
        window.addEventListener('firebase-ready', h);
        return () => window.removeEventListener('firebase-ready', h);
      }, []);
      return ready;
    };

    const useCollection = (collName) => {
      const [data, setData] = useState([]);
      const fbReady = useFirebase();
      useEffect(() => {
        if (!fbReady || !window.__db) return;
        const { collection, onSnapshot } = window.__fs;
        const unsub = onSnapshot(collection(window.__db, collName), snap => {
          setData(snap.docs.map(d => ({ ...d.data(), _docId: d.id })));
        });
        return unsub;
      }, [fbReady, collName]);
      return data;
    };

    const compressImage = (dataUrl, maxWidth = 900, quality = 0.65) => new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });

    const compressImages = async (images) => {
      if (!images || !images.length) return [];
      return Promise.all(images.map(async img => ({ ...img, data: img.data ? await compressImage(img.data) : img.data })));
    };

    const fbAdd = async (collName, data) => {
      if (!window.__db) return null;
      const { collection, addDoc } = window.__fs;
      const { _docId, ...clean } = data;
      const ref = await addDoc(collection(window.__db, collName), clean);
      return ref.id;
    };

    const fbAddWithImages = async (collName, data) => {
      if (!window.__db) return null;
      const { collection, addDoc } = window.__fs;
      const { _docId, ...clean } = data;
      const images = await compressImages(clean.images || []);
      const docs = (clean.docs || []).map(d => ({ name: d.name, type: d.type, size: d.size, uploadedAt: d.uploadedAt, data: d.data || '' }));
      const ref = await addDoc(collection(window.__db, collName), { ...clean, images, docs });
      return ref.id;
    };

    const fbUpdate = async (collName, docId, data) => {
      if (!window.__db || !docId) return;
      const { doc, updateDoc } = window.__fs;
      const { _docId, ...safe } = data;
      const images = await compressImages(safe.images || []);
      const docs = (safe.docs || []).map(d => ({ name: d.name, type: d.type, size: d.size, uploadedAt: d.uploadedAt, data: d.data || '' }));
      await updateDoc(doc(window.__db, collName, docId), { ...safe, images, docs });
    };

    /* Actualiza solo campos específicos, sin tocar imágenes */
    const fbSetField = async (collName, docId, fields) => {
      if (!window.__db || !docId) return;
      const { doc, updateDoc } = window.__fs;
      await updateDoc(doc(window.__db, collName, docId), fields);
    };

    const fbDelete = async (collName, docId) => {
      if (!window.__db || !docId) return;
      const { doc, deleteDoc } = window.__fs;
      await deleteDoc(doc(window.__db, collName, docId));
    };

/* ─── HOOKS ─── */
function useMobile() {
  const [mob, setMob] = useState(window.innerWidth < 720);
  useEffect(() => {
    const h = () => setMob(window.innerWidth < 720);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mob;
}

const sta = (id) => STATUSES.find(s => s.id === id) || STATUSES[0];
const pri = (id) => PRIORITIES.find(p => p.id === id) || PRIORITIES[1];

/* Formatea cualquier número como VDS-0001 */
const fmtTicket = (n) => n ? `VDS-${String(n).padStart(4, '0')}` : '—';
/* Calcula el siguiente número de ticket disponible, máximo 1000 */
const nextTicketNum = (reports) => {
  const next = Math.max(0, ...reports.map(r => Number(r.ticketNum) || 0)) + 1;
  return Math.min(next, 1000);
};

/* ─── APP ROOT ─── */
function App() {
  const fbReports      = useCollection('reports');
  const fbVendors      = useCollection('vendors');
  const fbResidents    = useCollection('residents');
  const fbInspections  = useCollection('inspections');
  const fbComprobantes = useCollection('comprobantes');
  const fbVotes        = useCollection('votes');
  const [user, setUser] = useState(() => {
    try { const s = localStorage.getItem('vds_session'); return s ? JSON.parse(s) : null; } catch { return null; }
  });

  const handleLogin = (u) => {
    setUser(u);
    if (u.role === 'residente') {
      try { localStorage.setItem('vds_session', JSON.stringify(u)); } catch {}
    }
  };
  const handleLogout = () => {
    setUser(null);
    try { localStorage.removeItem('vds_session'); } catch {}
  };
  const [reports,      setReportsLocal]      = useState([]);
  const [vendors,      setVendorsLocal]      = useState([]);
  const [residents,    setResidentsLocal]    = useState([]);
  const [inspections,  setInspectionsLocal]  = useState([]);
  const [comprobantes, setComprobantesLocal] = useState([]);
  const [votes,        setVotesLocal]        = useState([]);

  useEffect(() => {
    if (!fbReports.length) return;
    const withNum    = fbReports.filter(r => r.ticketNum);
    const withoutNum = fbReports.filter(r => !r.ticketNum);
    if (!withoutNum.length) { setReportsLocal(fbReports); return; }
    // Ordenar los sin número por id (timestamp) para mantener orden cronológico
    const sorted = [...withoutNum].sort((a, b) => (Number(a.id) || 0) - (Number(b.id) || 0));
    let next = Math.max(0, ...withNum.map(r => Number(r.ticketNum) || 0));
    const backfilled = sorted.map(r => {
      next = Math.min(next + 1, 1000);
      return { ...r, ticketNum: next };
    });
    // Persistir ticketNum en Firebase sin tocar imágenes
    backfilled.forEach(r => { if (r._docId) fbSetField('reports', r._docId, { ticketNum: r.ticketNum }); });
    setReportsLocal([...withNum, ...backfilled]);
  }, [fbReports.length]);
  useEffect(() => { if (fbVendors.length)      setVendorsLocal(fbVendors);           }, [fbVendors.length]);
  useEffect(() => { if (fbResidents.length)    setResidentsLocal(fbResidents);       }, [fbResidents.length]);
  useEffect(() => { if (fbInspections.length)  setInspectionsLocal(fbInspections);   }, [fbInspections.length]);
  useEffect(() => { if (fbComprobantes.length) setComprobantesLocal(fbComprobantes); }, [fbComprobantes.length]);
  useEffect(() => { if (fbVotes.length) setVotesLocal(fbVotes); },
    // eslint-disable-next-line
    [fbVotes.map(v => (v._docId||v.id) + (v.respuestas||[]).length).join('|')]);

  const setReports = async (updater) => {
    const prev = reports, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const r of next) { if (!r._docId) await fbAddWithImages('reports', r); }
    for (const r of prev) { if (r._docId && !next.find(x => x._docId === r._docId)) await fbDelete('reports', r._docId); }
    for (const r of next) { if (r._docId) { const o = prev.find(x => x._docId === r._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...r,_docId:''})) await fbUpdate('reports', r._docId, r); } }
  };
  const setVendors = async (updater) => {
    const prev = vendors, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const v of next) { if (!v._docId) await fbAdd('vendors', v); }
    for (const v of prev) { if (v._docId && !next.find(x => x._docId === v._docId)) await fbDelete('vendors', v._docId); }
    for (const v of next) { if (v._docId) { const o = prev.find(x => x._docId === v._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...v,_docId:''})) { const {_docId,...safe}=v; await fbUpdate('vendors', v._docId, safe); } } }
  };
  const setResidents = async (updater) => {
    const prev = residents, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const r of next) { if (!r._docId) await fbAdd('residents', r); }
    for (const r of prev) { if (r._docId && !next.find(x => x._docId === r._docId)) await fbDelete('residents', r._docId); }
    for (const r of next) { if (r._docId) { const o = prev.find(x => x._docId === r._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...r,_docId:''})) { const {_docId,...safe}=r; await fbUpdate('residents', r._docId, safe); } } }
  };
  const setInspections = async (updater) => {
    const prev = inspections, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const i of next) { if (!i._docId) await fbAdd('inspections', i); }
    for (const i of prev) { if (i._docId && !next.find(x => x._docId === i._docId)) await fbDelete('inspections', i._docId); }
    for (const i of next) { if (i._docId) { const o = prev.find(x => x._docId === i._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...i,_docId:''})) { const {_docId,...safe}=i; await fbSetField('inspections', i._docId, safe); } } }
  };
  const setComprobantes = async (updater) => {
    const prev = comprobantes, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const c of next) { if (!c._docId) await fbAddWithImages('comprobantes', c); }
    for (const c of prev) { if (c._docId && !next.find(x => x._docId === c._docId)) await fbDelete('comprobantes', c._docId); }
    for (const c of next) { if (c._docId) { const o = prev.find(x => x._docId === c._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...c,_docId:''})) { const {_docId,...safe}=c; await fbSetField('comprobantes', c._docId, safe); } } }
  };
  const setVotes = async (updater) => {
    const prev = votes, next = typeof updater === 'function' ? updater(prev) : updater;
    for (const v of next) { if (!v._docId) await fbAdd('votes', v); }
    for (const v of prev) { if (v._docId && !next.find(x => x._docId === v._docId)) await fbDelete('votes', v._docId); }
    for (const v of next) { if (v._docId) { const o = prev.find(x => x._docId === v._docId); if (o && JSON.stringify({...o,_docId:''}) !== JSON.stringify({...v,_docId:''})) { const {_docId,...safe}=v; await fbUpdate('votes', v._docId, safe); } } }
  };

  if (!user) return <LoginScreen onLogin={handleLogin} residents={residents} />;
  if (user.role === "residente") return <ResidentApp user={user} reports={reports} setReports={setReports} comprobantes={comprobantes} setComprobantes={setComprobantes} votes={votes} setVotes={setVotes} onLogout={handleLogout} />;
  return <AdminApp user={user} reports={reports} setReports={setReports} vendors={vendors} setVendors={setVendors} residents={residents} setResidents={setResidents} inspections={inspections} setInspections={setInspections} comprobantes={comprobantes} setComprobantes={setComprobantes} votes={votes} setVotes={setVotes} onLogout={handleLogout} />;
}

                <>
                  <input
                    style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 10, padding: "12px 14px", color: "#f8fafc", fontSize: 14, boxSizing: "border-box", fontFamily: "'Inter',sans-serif", marginBottom: 12, outline: "none" }}
                    placeholder="Tu nombre completo"
                    value={name} onChange={e => setName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && name.trim() && onLogin({ role, name: name.trim(), apt: "" })}
                  />
                  <button
                    onClick={() => { if (name.trim()) onLogin({ role, name: name.trim(), apt: "" }); }}
                    style={{ width: "100%", background: "#f97316", color: "#fff", border: "none", borderRadius: 10, padding: "14px", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "'Inter',sans-serif", marginTop: 4, letterSpacing: 0.2, boxShadow: "0 4px 14px rgba(249,115,22,0.4)" }}>
                    Ingresar →
                  </button>
                </>
              )}
            </div>
          )}
        </div>
        <div style={{ color: "#334155", textAlign: "center", fontSize: 11, marginTop: 18 }}>v2.0 · 46 Apartamentos · PH Vista Del Sol</div>
      </div>
      <style>{`@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }`}</style>
    </div>
  );
}

/* ─── ADMIN APP ─── */
function AdminApp({ user, reports, setReports, vendors, setVendors, residents, setResidents, inspections, setInspections, comprobantes, setComprobantes, votes, setVotes, onLogout }) {
  const [view, setView]             = useState("dashboard");
  const [filterCat, setFC]          = useState("all");
  const [filterSta, setFS]          = useState("all");
  const [selectedReport, setSR]     = useState(null);
  const [showNewReport, setSNR]     = useState(false);
  const [showNewVendor, setSNV]     = useState(false);
  const [showNewResident, setSNRes] = useState(false);
  const mob = useMobile();

  const navItems = [
    { id: "dashboard",    icon: "📊", label: "Panel" },
    { id: "reports",      icon: "📋", label: "Reportes" },
    { id: "inspecciones", icon: "✅", label: "Checklists" },
    { id: "vendors",      icon: "🏢", label: "Proveedores" },
    { id: "residentes",   icon: "👥", label: "Residentes" },
    { id: "votaciones",   icon: "🗳️", label: "Votaciones" },
  ];

  const exportExcel = useCallback(() => {
    const data = reports.map(r => ({
      "ID": fmtTicket(r.ticketNum || r.id),
      "Título": r.title,
      "Categoría": cat(r.category).label,
      "Apartamento": r.apt,
      "Reportado por": r.reporterName,
      "Teléfono": r.reporterPhone,
      "Fecha": r.date,
      "Prioridad": pri(r.priority).label,
      "Estado": sta(r.status).label,
      "Proveedor": r.vendor || "Sin asignar",
      "Descripción": r.description,
      "Notas": r.notes,
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [{ wch: 5 }, { wch: 35 }, { wch: 14 }, { wch: 12 }, { wch: 20 }, { wch: 14 }, { wch: 12 }, { wch: 10 }, { wch: 14 }, { wch: 22 }, { wch: 40 }, { wch: 30 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Reportes");
    XLSX.writeFile(wb, `reportes_${new Date().toISOString().slice(0,10)}.xlsx`);
  }, [reports]);

  const printSummary = () => {
    const pending = reports.filter(r => r.status === "pendiente").length;
    const inProg  = reports.filter(r => r.status === "en_proceso").length;
    const done    = reports.filter(r => r.status === "listo").length;
    const urgent  = reports.filter(r => r.priority === "alta" && r.status !== "listo");

    const win = window.open("", "_blank");
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Informe Junta - PH Vista Del Sol</title>
    <style>
      body { font-family: 'Inter',sans-serif; margin: 0; padding: 32px; color: #0f172a; }
      h1 { font-size: 22px; border-bottom: 3px solid #0d1b2a; padding-bottom: 10px; }
      h2 { font-size: 15px; color: #555; margin-top: 28px; text-transform: uppercase; letter-spacing: 1px; }
      .stats { display: flex; gap: 20px; margin: 20px 0; }
      .stat { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 14px; text-align: center; }
      .stat-num { font-size: 36px; font-weight: 700; }
      .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; }
      th { background: #0d1b2a; color: #fff; padding: 8px 10px; text-align: left; }
      td { padding: 7px 10px; border-bottom: 1px solid #eee; }
      tr:nth-child(even) td { background: #f9f9f9; }
      .badge { border-radius: 20px; padding: 2px 10px; font-size: 10px; font-weight: 700; }
      footer { margin-top: 40px; font-size: 10px; color: #aaa; border-top: 1px solid #eee; padding-top: 12px; }
      @media print { @page { margin: 20mm; } }
    </style></head><body>
    <h1>🏢 Informe de Gestión — PH Vista Del Sol</h1>
    <p style="color:#888;font-size:13px">Generado: ${new Date().toLocaleDateString("es-ES", { weekday:"long", year:"numeric", month:"long", day:"numeric" })} · 46 Apartamentos</p>
    <h2>Resumen General</h2>
    <div class="stats">
      <div class="stat"><div class="stat-num">${reports.length}</div><div class="stat-label">Total Reportes</div></div>
      <div class="stat" style="border-color:#d97706"><div class="stat-num" style="color:#d97706">${pending}</div><div class="stat-label">Por Asignar</div></div>
      <div class="stat" style="border-color:#2563eb"><div class="stat-num" style="color:#2563eb">${inProg}</div><div class="stat-label">En Proceso</div></div>
      <div class="stat" style="border-color:#059669"><div class="stat-num" style="color:#059669">${done}</div><div class="stat-label">Resueltos</div></div>
    </div>
    ${urgent.length > 0 ? `<h2>⚠ Urgentes Sin Resolver (${urgent.length})</h2>
    <table><tr><th>Título</th><th>Categoría</th><th>Apto</th><th>Estado</th><th>Proveedor</th></tr>
    ${urgent.map(r=>`<tr><td>${r.title}</td><td>${cat(r.category).label}</td><td>${r.apt}</td><td>${sta(r.status).label}</td><td>${r.vendor||"Sin asignar"}</td></tr>`).join("")}
    </table>` : `<p style="color:#059669;font-weight:700">✅ No hay reportes urgentes activos.</p>`}
    <h2>Todos los Reportes</h2>
    <table><tr><th>#</th><th>Título</th><th>Categoría</th><th>Apto</th><th>Fecha</th><th>Estado</th><th>Proveedor</th></tr>
    ${reports.map(r=>`<tr><td>${fmtTicket(r.ticketNum||r.id)}</td><td>${r.title}</td><td>${cat(r.category).label}</td><td>${r.apt}</td><td>${r.date}</td><td>${sta(r.status).label}</td><td>${r.vendor||"—"}</td></tr>`).join("")}
    </table>
    <footer>PH Vista Del Sol v2.0 · Generado por ${user.name} · ${new Date().toLocaleString("es-ES")}</footer>
    </body></html>`);
    win.document.close();
    win.print();
  };

  const filteredReports = reports.filter(r =>
    (filterCat === "all" || r.category === filterCat) &&
    (filterSta === "all" || r.status === filterSta)
  );

  return (
    <div style={{ display: "flex", height: "100dvh", fontFamily: "'Inter',sans-serif", background: "#f0f4f8", color: "#1e293b", flexDirection: mob ? "column" : "row" }}>
      {/* DESKTOP SIDEBAR */}
      {!mob && (
        <div style={{ width: 220, background: "#0d1b2a", color: "#fff", display: "flex", flexDirection: "column", flexShrink: 0 }}>
          <div style={{ padding: "24px 20px 20px", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
            <div style={{ fontSize: 24, marginBottom: 6 }}>🏢</div>
            <div style={{ fontWeight: 700, fontSize: 14, color: "#f8fafc", letterSpacing: 0.2 }}>PH Vista Del Sol</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>46 Apartamentos</div>
          </div>
          {navItems.map(item => (
            <button key={item.id} onClick={() => { setView(item.id); setSR(null); }} style={{
              background: view === item.id ? "rgba(249,115,22,0.12)" : "transparent",
              border: "none", color: view === item.id ? "#f97316" : "#94a3b8",
              padding: "12px 20px", display: "flex", alignItems: "center", gap: 11,
              cursor: "pointer", textAlign: "left", width: "100%",
              borderLeft: view === item.id ? "3px solid #f97316" : "3px solid transparent",
              fontSize: 13, fontFamily: "'Inter',sans-serif", transition: "all 0.15s", fontWeight: view === item.id ? 600 : 400
            }}>
              <span style={{ fontSize: 16 }}>{item.icon}</span>
              <span>{item.label}</span>
            </button>
          ))}
          <div style={{ marginTop: "auto", padding: "16px 20px", borderTop: "1px solid rgba(255,255,255,0.07)" }}>
            <div style={{ fontSize: 12, color: "#f8fafc", fontWeight: 600 }}>{user.name}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>Admin / Junta</div>
            <button onClick={onLogout} style={{ marginTop: 10, background: "transparent", border: "1px solid rgba(255,255,255,0.12)", color: "#94a3b8", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 11, width: "100%", fontFamily: "'Inter',sans-serif" }}>Cerrar sesión</button>
          </div>
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", marginBottom: mob ? "calc(64px + env(safe-area-inset-bottom, 0px))" : 0 }}>
        {/* TOPBAR */}
        <div style={{ background: "#fff", borderBottom: "1px solid #e2e8f0", padding: mob ? "12px 16px" : "14px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: mob ? 16 : 18, color: "#0f172a", letterSpacing: -0.3 }}>
              {view === "dashboard"    && "Panel Principal"}
              {view === "reports"      && (selectedReport ? selectedReport.title : "Gestión de Reportes")}
              {view === "vendors"      && "Proveedores"}
              {view === "inspecciones" && "Checklists de Inspección"}
              {view === "residentes"   && "Base de Residentes"}
              {view === "votaciones"   && "Votaciones"}
            </div>
            {!mob && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>{new Date().toLocaleDateString("es-ES", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</div>}
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {view === "reports" && !selectedReport && (
              <>
                <button onClick={exportExcel} style={btnSec(mob)}>📥 Excel</button>
                <button onClick={printSummary} style={btnSec(mob)}>🖨️ PDF</button>
                <button onClick={() => { if (nextTicketNum(reports) > 1000) { alert("⚠️ Se alcanzó el límite de 1000 tickets."); return; } setSNR(true); }} style={btnPri(mob)}>+ Reporte</button>
              </>
            )}
            {view === "vendors"    && <button onClick={() => setSNV(true)} style={btnPri(mob)}>+ Proveedor</button>}
            {view === "residentes" && <button onClick={() => setSNRes(true)} style={btnPri(mob)}>+ Residente</button>}
            {mob && <button onClick={onLogout} style={{ background: "transparent", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 10px", fontSize: 11, cursor: "pointer", color: "#64748b" }}>Salir</button>}
          </div>
        </div>

        {/* SCROLL AREA */}
        <div style={{ flex: 1, overflow: "auto", padding: mob ? "16px 14px 32px" : "24px 28px" }}>
          {view === "dashboard" && <AdminDashboard reports={reports} vendors={vendors} setView={(v) => { setView(v); setSR(null); }} setFS={setFS} mob={mob} printSummary={printSummary} />}
          {view === "reports" && (
            selectedReport
              ? <ReportDetail report={selectedReport} onBack={() => setSR(null)} onUpdate={upd => { setReports(p => p.map(r => r.id === upd.id ? upd : r)); setSR(upd); }} onDelete={id => { setReports(p => p.filter(r => r.id !== id)); setSR(null); }} vendors={vendors} mob={mob} />
              : <ReportsTable reports={filteredReports} filterCat={filterCat} setFC={setFC} filterSta={filterSta} setFS={setFS} onSelect={setSR} mob={mob} />
          )}
          {view === "inspecciones" && <InspeccionesView inspections={inspections} setInspections={setInspections} user={user} mob={mob} />}
          {view === "vendors"      && <VendorsView vendors={vendors} setVendors={setVendors} reports={reports} showNew={showNewVendor} setShowNew={setSNV} mob={mob} />}
          {view === "residentes"   && <ResidentesView residents={residents} setResidents={setResidents} reports={reports} comprobantes={comprobantes} setComprobantes={setComprobantes} showNew={showNewResident} setShowNew={setSNRes} mob={mob} />}
          {view === "votaciones"   && <VotacionesView votes={votes} setVotes={setVotes} residents={residents} user={user} mob={mob} />}
        </div>
      </div>

      {/* MOBILE BOTTOM NAV */}
      {mob && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0d1b2a", display: "flex", flexDirection: "column", borderTop: "1px solid rgba(255,255,255,0.07)", zIndex: 100, paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
          <div style={{ display: "flex" }}>
            {navItems.map(item => (
              <button key={item.id} onClick={() => { setView(item.id); setSR(null); }} style={{
                flex: 1, background: "transparent", border: "none", padding: "10px 0",
                color: view === item.id ? "#f97316" : "#475569", cursor: "pointer", fontFamily: "'Inter',sans-serif"
              }}>
                <div style={{ fontSize: 18 }}>{item.icon}</div>
                <div style={{ fontSize: 9, marginTop: 2, fontWeight: view === item.id ? 700 : 400 }}>{item.label}</div>
              </button>
            ))}
          </div>
        </div>
      )}

      {showNewReport && <NewReportModal onClose={() => setSNR(false)} onSave={r => { const tn = nextTicketNum(reports); setReports(p => [...p, { ...r, id: Date.now(), ticketNum: tn }]); setSNR(false); }} vendors={vendors} mob={mob} />}
    </div>
  );
}

/* ─── ADMIN DASHBOARD ─── */
function AdminDashboard({ reports, vendors, setView, setFS, mob, printSummary }) {
  const stats = [
    { label: "Total Reportes",  value: reports.length,                                         icon: "📋", color: "#6366f1", bg: "#eef2ff", status: null },
    { label: "Por Asignar",     value: reports.filter(r => r.status === "pendiente").length,   icon: "⏳", color: "#f59e0b", bg: "#fefce8", status: "pendiente" },
    { label: "En Proceso",      value: reports.filter(r => r.status === "en_proceso").length,  icon: "🔄", color: "#3b82f6", bg: "#eff6ff", status: "en_proceso" },
    { label: "Resueltos",       value: reports.filter(r => r.status === "listo").length,       icon: "✅", color: "#10b981", bg: "#ecfdf5", status: "listo" },
  ];
  const byCat = CATS.map(c => ({ ...c, count: reports.filter(r => r.category === c.id).length })).filter(c => c.count > 0).sort((a,b) => b.count - a.count);
  const urgent = reports.filter(r => r.priority === "alta" && r.status !== "listo");
  const card = { background: "#fff", borderRadius: 14, boxShadow: "0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04)" };

  return (
    <div>
      {/* Stat cards */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 14, marginBottom: 22 }}>
        {stats.map(s => (
          <div key={s.label} onClick={() => { if (s.status) setFS(s.status); setView("reports"); }}
            style={{ ...card, padding: mob ? "16px 14px" : "20px", cursor: "pointer", transition: "transform 0.12s, box-shadow 0.12s" }}
            onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 4px 20px rgba(0,0,0,0.1)"; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = card.boxShadow; }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
              <div style={{ width: 40, height: 40, borderRadius: 10, background: s.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{s.icon}</div>
              <span style={{ fontSize: 10, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginTop: 4 }}>Ver →</span>
            </div>
            <div style={{ fontSize: mob ? 30 : 36, fontWeight: 800, color: "#0f172a", lineHeight: 1, letterSpacing: -1 }}>{s.value}</div>
            <div style={{ fontSize: 12, color: "#64748b", marginTop: 5, fontWeight: 500 }}>{s.label}</div>
            <div style={{ height: 3, background: "#f1f5f9", borderRadius: 4, marginTop: 14 }}>
              <div style={{ height: "100%", width: reports.length > 0 ? `${(s.value / reports.length) * 100}%` : "0%", background: s.color, borderRadius: 4, transition: "width 0.6s" }} />
            </div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 16 }}>
        {/* Reportes por categoría */}
        <div style={{ ...card, padding: mob ? 18 : 22 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: "#0f172a", marginBottom: 18, letterSpacing: -0.2 }}>Reportes por Categoría</div>
          {byCat.length === 0
            ? <div style={{ color: "#94a3b8", fontSize: 13, textAlign: "center", padding: 20 }}>Sin reportes aún</div>
            : byCat.map(c => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 13 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: c.color + "15", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{c.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 5 }}>
                    <span style={{ fontWeight: 600, color: "#1e293b" }}>{c.label}</span>
                    <span style={{ color: "#94a3b8", fontWeight: 600 }}>{c.count}</span>
                  </div>
                  <div style={{ height: 6, background: "#f1f5f9", borderRadius: 4 }}>
                    <div style={{ height: "100%", width: `${reports.length > 0 ? (c.count / reports.length) * 100 : 0}%`, background: c.color, borderRadius: 4, transition: "width 0.5s" }} />
                  </div>
                </div>
              </div>
            ))
          }
        </div>

        {/* Urgencias */}
        <div style={{ ...card, padding: mob ? 18 : 22 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "#fef2f2", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🚨</div>
            <div style={{ fontWeight: 700, fontSize: 14, color: "#0f172a", letterSpacing: -0.2 }}>Urgencias Activas</div>
            {urgent.length > 0 && <span style={{ marginLeft: "auto", background: "#ef4444", color: "#fff", borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>{urgent.length}</span>}
          </div>
          {urgent.length === 0
            ? <div style={{ textAlign: "center", padding: "20px 0" }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>✅</div>
                <div style={{ color: "#10b981", fontSize: 13, fontWeight: 600 }}>Sin urgencias activas</div>
              </div>
            : urgent.map(r => {
                const c = cat(r.category);
                return (
                  <div key={r.id} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "10px 0", borderBottom: "1px solid #f1f5f9" }}>
                    <div style={{ width: 6, flexShrink: 0, alignSelf: "stretch", background: "#ef4444", borderRadius: 3, marginTop: 2 }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 13, color: "#1e293b" }}>{r.title}</div>
                      <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 3 }}>{c.label} · Apto {r.apt} · {r.date}</div>
                      <div style={{ marginTop: 5 }}><Badge status={r.status} /></div>
                    </div>
                  </div>
                );
              })
          }
        </div>

        {/* Actividad reciente */}
        <div style={{ ...card, padding: mob ? 18 : 22, gridColumn: mob ? "1" : "1 / -1" }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: "#0f172a", marginBottom: 18, letterSpacing: -0.2 }}>Actividad Reciente</div>
          {reports.length === 0
            ? <div style={{ color: "#94a3b8", fontSize: 13, textAlign: "center", padding: 20 }}>Sin reportes aún</div>
            : reports.slice(-6).reverse().map(r => {
                const c = cat(r.category);
                return (
                  <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "11px 0", borderBottom: "1px solid #f8fafc" }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: c.color + "15", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>{c.icon}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, fontSize: 13, color: "#1e293b", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.title}</div>
                      <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>Apto {r.apt} · {r.reporterName} · {r.date}</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 5, flexShrink: 0 }}>
                      <Badge status={r.status} />
                      <PriDot priority={r.priority} />
                    </div>
                  </div>
                );
              })
          }
        </div>
      </div>

      {/* Informe para junta */}
      <div style={{ background: "linear-gradient(135deg, #0d1b2a 0%, #1e3a5f 100%)", borderRadius: 14, padding: mob ? 18 : 22, marginTop: 18, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 14, boxShadow: "0 4px 20px rgba(13,27,42,0.25)" }}>
        <div>
          <div style={{ color: "#f8fafc", fontWeight: 700, fontSize: 15, letterSpacing: -0.2 }}>📄 Informe para Junta Directiva</div>
          <div style={{ color: "#64748b", fontSize: 12, marginTop: 4 }}>Genera el resumen completo listo para imprimir o proyectar</div>

/* ─── INSPECCIONES VIEW ─── */
function InspeccionesView({ inspections, setInspections, user, mob }) {
  const [subview, setSubview] = useState("home"); // home | nueva | running | detail
  const [activeInsp, setActiveInsp] = useState(null);
  const [filterZone, setFilterZone] = useState("all");
  const [filterFreq, setFilterFreq] = useState("all");

  const startNew = (zoneId, frequency) => {
    const zone = ZONES.find(z => z.id === zoneId);
    const insp = {
      id: Date.now(),
      zoneId,
      frequency,
      date: new Date().toISOString().slice(0, 10),
      inspector: user.name,
      completed: false,
      items: zone.items.map(label => ({ label, status: "", note: "" })),
      generalNote: "",
    };
    setActiveInsp(insp);
    setSubview("running");
  };

  const saveInspection = (insp) => {
    const finished = { ...insp, completed: true };
    setInspections(prev => {
      const existing = prev.findIndex(i => i.id === insp.id);
      if (existing >= 0) { const arr = [...prev]; arr[existing] = finished; return arr; }
      return [...prev, finished];
    });
    setActiveInsp(finished);
    setSubview("detail");
  };

  const printInspection = (insp) => {
    const zone = ZONES.find(z => z.id === insp.zoneId);
    const freq = FREQUENCIES.find(f => f.id === insp.frequency);
    const bien = insp.items.filter(i => i.status === "bien").length;
    const aten = insp.items.filter(i => i.status === "atencion").length;
    const mal  = insp.items.filter(i => i.status === "mal").length;
    const win = window.open("", "_blank");
    win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Inspección ${zone.label}</title>
    <style>body{font-family:'Inter',sans-serif;margin:32px;color:#0f172a}h1{font-size:20px;border-bottom:3px solid #0f172a;padding-bottom:8px}.stats{display:flex;gap:16px;margin:16px 0}.stat{flex:1;border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center}.stat-num{font-size:28px;font-weight:700}.table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}th{background:#0f172a;color:#fff;padding:8px 10px;text-align:left}td{padding:7px 10px;border-bottom:1px solid #eee}.bien{color:#059669}.aten{color:#d97706}.mal{color:#dc2626}footer{margin-top:32px;font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:10px}</style>
    </head><body>
    <h1>${zone.icon} Inspección: ${zone.label}</h1>
    <p style="color:#888;font-size:12px">Frecuencia: ${freq?.label} · Inspector: ${insp.inspector} · Fecha: ${insp.date}</p>
    <div class="stats">
      <div class="stat" style="border-color:#059669"><div class="stat-num" style="color:#059669">${bien}</div><div style="font-size:11px;color:#888">Bien</div></div>
      <div class="stat" style="border-color:#d97706"><div class="stat-num" style="color:#d97706">${aten}</div><div style="font-size:11px;color:#888">Requiere atención</div></div>
      <div class="stat" style="border-color:#dc2626"><div class="stat-num" style="color:#dc2626">${mal}</div><div style="font-size:11px;color:#888">Mal estado</div></div>
    </div>
    <table class="table"><tr><th>#</th><th>Componente</th><th>Estado</th><th>Observación</th></tr>
    ${insp.items.map((item, i) => {
      const cls = item.status === "bien" ? "bien" : item.status === "atencion" ? "aten" : item.status === "mal" ? "mal" : "";
      const lbl = ITEM_STATUS.find(s => s.id === item.status)?.label || "—";
      return `<tr><td>${i+1}</td><td>${item.label}</td><td class="${cls}">${lbl}</td><td>${item.note || "—"}</td></tr>`;
    }).join("")}
    </table>
    ${insp.generalNote ? `<p style="margin-top:16px"><strong>Observación general:</strong> ${insp.generalNote}</p>` : ""}
    <footer>PH Vista Del Sol · ${insp.inspector} · ${new Date().toLocaleString("es-ES")}</footer>
    </body></html>`);
    win.document.close();
    win.print();
  };

  const filtered = inspections.filter(i =>
    (filterZone === "all" || i.zoneId === filterZone) &&
    (filterFreq === "all" || i.frequency === filterFreq)
  );

  /* ── HOME ── */
  if (subview === "home") return (
    <div>
      {/* Zone cards */}
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>Iniciar Nueva Inspección</div>
        <div style={{ fontSize: 12, color: "#64748b", marginBottom: 14 }}>Selecciona la zona a inspeccionar</div>
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(3, 1fr)", gap: 10 }}>
          {ZONES.map(z => (
            <div key={z.id} onClick={() => { setActiveInsp({ zoneId: z.id, frequency: "" }); setSubview("nueva"); }}
              style={{ background: "#fff", borderRadius: 10, padding: mob ? "14px 12px" : "16px 14px", cursor: "pointer", border: `2px solid ${z.color}22`, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", transition: "all 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = z.color; e.currentTarget.style.transform = "translateY(-2px)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = z.color + "22"; e.currentTarget.style.transform = ""; }}>
              <div style={{ fontSize: mob ? 24 : 28, marginBottom: 6 }}>{z.icon}</div>
              <div style={{ fontWeight: 700, fontSize: mob ? 12 : 13, color: "#0f172a" }}>{z.label}</div>
              <div style={{ fontSize: 10, color: "#64748b", marginTop: 3 }}>{z.items.length} ítems</div>
            </div>
          ))}
        </div>
      </div>

      {/* History */}
      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>Historial de Inspecciones</div>
          <div style={{ display: "flex", gap: 8 }}>
            <select value={filterZone} onChange={e => setFilterZone(e.target.value)} style={selStyle}>
              <option value="all">Todas las zonas</option>
              {ZONES.map(z => <option key={z.id} value={z.id}>{z.icon} {z.label}</option>)}
            </select>
            <select value={filterFreq} onChange={e => setFilterFreq(e.target.value)} style={selStyle}>
              <option value="all">Todas las frecuencias</option>
              {FREQUENCIES.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
            </select>
          </div>
        </div>

        {filtered.length === 0
          ? <div style={{ background: "#fff", borderRadius: 10, padding: 32, textAlign: "center", color: "#64748b", fontSize: 13 }}>No hay inspecciones registradas aún.<br />Selecciona una zona arriba para comenzar.</div>
          : (mob
            ? filtered.slice().reverse().map(insp => <InspCard key={insp.id} insp={insp} onSelect={() => { setActiveInsp(insp); setSubview("detail"); }} onPrint={printInspection} />)
            : (
              <div style={{ background: "#fff", borderRadius: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", overflow: "hidden" }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead><tr style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0" }}>
                    {["Zona","Frecuencia","Fecha","Inspector","✅ Bien","⚠️ Atención","❌ Mal","Acciones"].map(h => (
                      <th key={h} style={{ padding: "10px 13px", textAlign: "left", fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {filtered.slice().reverse().map(insp => {
                      const z = ZONES.find(z => z.id === insp.zoneId);
                      const freq = FREQUENCIES.find(f => f.id === insp.frequency);
                      const bien = insp.items.filter(i => i.status === "bien").length;
                      const aten = insp.items.filter(i => i.status === "atencion").length;
                      const mal  = insp.items.filter(i => i.status === "mal").length;
                      return (
                        <tr key={insp.id} style={{ borderBottom: "1px solid #f0f4f8" }}
                          onMouseEnter={e => e.currentTarget.style.background = "#f8fafc"}
                          onMouseLeave={e => e.currentTarget.style.background = ""}>
                          <td style={{ padding: "10px 13px", fontWeight: 600, fontSize: 13 }}>{z?.icon} {z?.label}</td>
                          <td style={{ padding: "10px 13px", fontSize: 12 }}>{freq?.label}</td>
                          <td style={{ padding: "10px 13px", fontSize: 12, color: "#64748b" }}>{insp.date}</td>
                          <td style={{ padding: "10px 13px", fontSize: 12 }}>{insp.inspector}</td>
                          <td style={{ padding: "10px 13px", fontWeight: 700, color: "#059669" }}>{bien}</td>
                          <td style={{ padding: "10px 13px", fontWeight: 700, color: "#d97706" }}>{aten}</td>
                          <td style={{ padding: "10px 13px", fontWeight: 700, color: "#dc2626" }}>{mal}</td>
                          <td style={{ padding: "10px 13px" }}>
                            <button onClick={() => { setActiveInsp(insp); setSubview("detail"); }} style={{ ...btnSec(false), fontSize: 11, padding: "5px 10px", marginRight: 6 }}>Ver</button>
                            <button onClick={() => printInspection(insp)} style={{ ...btnSec(false), fontSize: 11, padding: "5px 10px" }}>🖨️</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            ))
        }
      </div>
    </div>
  );

  /* ── SELECT FREQUENCY ── */
  if (subview === "nueva") {
    const zone = ZONES.find(z => z.id === activeInsp.zoneId);
    return (
      <div>
        <button onClick={() => setSubview("home")} style={{ ...btnSec(mob), marginBottom: 20 }}>← Volver</button>
        <div style={{ fontWeight: 700, fontSize: 18, marginBottom: 4 }}>{zone.icon} {zone.label}</div>
        <div style={{ fontSize: 13, color: "#64748b", marginBottom: 22 }}>Selecciona la frecuencia de esta inspección</div>
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4, 1fr)", gap: 12 }}>
          {FREQUENCIES.map(f => (
            <div key={f.id} onClick={() => startNew(zone.id, f.id)}
              style={{ background: "#fff", borderRadius: 10, padding: "20px 16px", textAlign: "center", cursor: "pointer", border: "2px solid #e2e8f0", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", transition: "all 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = zone.color; e.currentTarget.style.background = zone.color + "08"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#e2e8f0"; e.currentTarget.style.background = "#fff"; }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>{f.icon}</div>
              <div style={{ fontWeight: 700, fontSize: 14 }}>{f.label}</div>
              <div style={{ fontSize: 10, color: "#64748b", marginTop: 4 }}>cada {f.days === 1 ? "día" : f.days === 7 ? "7 días" : f.days === 14 ? "14 días" : f.days + " días"}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ── RUNNING CHECKLIST ── */
  if (subview === "running" && activeInsp) {
    return <RunningChecklist insp={activeInsp} setInsp={setActiveInsp} onSave={saveInspection} onBack={() => setSubview("home")} mob={mob} />;
  }

  /* ── DETAIL ── */
  if (subview === "detail" && activeInsp) {
    const zone = ZONES.find(z => z.id === activeInsp.zoneId);
    const freq = FREQUENCIES.find(f => f.id === activeInsp.frequency);
    const bien = activeInsp.items.filter(i => i.status === "bien").length;
    const aten = activeInsp.items.filter(i => i.status === "atencion").length;
    const mal  = activeInsp.items.filter(i => i.status === "mal").length;
    const total = activeInsp.items.filter(i => i.status && i.status !== "na").length;
    const score = total > 0 ? Math.round((bien / total) * 100) : 0;

    return (
      <div>
        <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
          <button onClick={() => setSubview("home")} style={btnSec(mob)}>← Historial</button>
          <div style={{ flex: 1 }} />
          <button onClick={() => printInspection(activeInsp)} style={btnSec(mob)}>🖨️ PDF</button>
          <button onClick={() => setInspections(p => p.filter(i => i.id !== activeInsp.id)) || setSubview("home")} style={{ ...btnSec(mob), color: "#dc2626", borderColor: "#dc2626" }}>🗑️</button>
        </div>

        <div style={{ fontWeight: 700, fontSize: mob ? 16 : 20, marginBottom: 4 }}>{zone.icon} {zone.label}</div>
        <div style={{ fontSize: 12, color: "#64748b", marginBottom: 18 }}>{freq?.label} · {activeInsp.inspector} · {activeInsp.date}</div>

        {/* Score */}
        <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
          {[
            { label: "Puntaje",           value: score + "%", color: score >= 80 ? "#059669" : score >= 50 ? "#d97706" : "#dc2626" },
            { label: "✅ Bien",           value: bien,        color: "#059669" },
            { label: "⚠️ Requiere atención", value: aten,    color: "#d97706" },
            { label: "❌ Mal estado",     value: mal,         color: "#dc2626" },
          ].map(s => (
            <div key={s.label} style={{ background: "#fff", borderRadius: 9, padding: "14px 16px", textAlign: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize: mob ? 24 : 28, fontWeight: 700, color: s.color }}>{s.value}</div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Items */}
        <div style={{ background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          {activeInsp.items.map((item, i) => {
            const st = ITEM_STATUS.find(s => s.id === item.status);
            return (
              <div key={i} style={{ display: "flex", alignItems: mob ? "flex-start" : "center", gap: 14, padding: "12px 16px", borderBottom: "1px solid #f0f4f8", flexDirection: mob ? "column" : "row" }}>
                <div style={{ width: 22, color: "#64748b", fontSize: 12, flexShrink: 0 }}>{i+1}</div>
                <div style={{ flex: 1, fontWeight: 600, fontSize: 13 }}>{item.label}</div>
                {st && <span style={{ background: st.bg, color: st.color, border: `1px solid ${st.color}44`, borderRadius: 20, padding: "3px 11px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap", flexShrink: 0 }}>{st.label}</span>}
                {item.note && <div style={{ fontSize: 12, color: "#94a3b8", fontStyle: "italic", flexShrink: 0, maxWidth: 220 }}>{item.note}</div>}
              </div>
            );
          })}
        </div>

        {activeInsp.generalNote && (
          <div style={{ background: "#fff", borderRadius: 10, padding: 16, marginTop: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>Observación general</div>
            <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.6 }}>{activeInsp.generalNote}</div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

/* ─── RUNNING CHECKLIST ─── */
function RunningChecklist({ insp, setInsp, onSave, onBack, mob }) {
  const zone = ZONES.find(z => z.id === insp.zoneId);
  const freq = FREQUENCIES.find(f => f.id === insp.frequency);
  const [noteIdx, setNoteIdx] = useState(null);
  const answered = insp.items.filter(i => i.status !== "").length;
  const progress = Math.round((answered / insp.items.length) * 100);

  const setItemStatus = (idx, status) => {
    setInsp(prev => {
      const items = [...prev.items];
      items[idx] = { ...items[idx], status };
      return { ...prev, items };
    });
  };
  const setItemNote = (idx, note) => {
    setInsp(prev => {
      const items = [...prev.items];
      items[idx] = { ...items[idx], note };
      return { ...prev, items };
    });
  };

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        <button onClick={onBack} style={btnSec(mob)}>✕ Cancelar</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: mob ? 15 : 18 }}>{zone.icon} {zone.label}</div>
          <div style={{ fontSize: 11, color: "#64748b" }}>{freq?.label} · {insp.date} · {insp.inspector}</div>
        </div>
        <button
          onClick={() => onSave(insp)}
          style={{ ...btnPri(mob), opacity: answered === 0 ? 0.5 : 1 }}
          disabled={answered === 0}>
          💾 Guardar
        </button>
      </div>

      {/* Progress */}
      <div style={{ background: "#fff", borderRadius: 10, padding: "14px 18px", marginBottom: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 8 }}>
          <span style={{ fontWeight: 600, color: "#475569" }}>Progreso</span>
          <span style={{ color: "#64748b" }}>{answered} / {insp.items.length} ítems</span>
        </div>
        <div style={{ height: 8, background: "#f1f0ec", borderRadius: 4 }}>
          <div style={{ height: "100%", width: `${progress}%`, background: progress === 100 ? "#059669" : "#2563eb", borderRadius: 4, transition: "width 0.3s" }} />
        </div>
      </div>

      {/* Items */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {insp.items.map((item, i) => (
          <div key={i} style={{ background: "#fff", borderRadius: 10, padding: mob ? "14px 14px" : "14px 18px", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", border: item.status ? `2px solid ${ITEM_STATUS.find(s => s.id === item.status)?.color}44` : "2px solid transparent" }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 10 }}>
              <span style={{ width: 22, height: 22, background: item.status ? ITEM_STATUS.find(s => s.id === item.status)?.bg : "#f0f4f8", color: item.status ? ITEM_STATUS.find(s => s.id === item.status)?.color : "#64748b", borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, flexShrink: 0, marginTop: 1 }}>{i+1}</span>
              <div style={{ fontWeight: 600, fontSize: mob ? 13 : 14, flex: 1 }}>{item.label}</div>
            </div>

            {/* Status buttons */}
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {ITEM_STATUS.map(st => (
                <button key={st.id} onClick={() => setItemStatus(i, st.id)}
                  style={{ flex: 1, minWidth: mob ? 60 : 80, background: item.status === st.id ? st.bg : "#f8fafc", border: `1.5px solid ${item.status === st.id ? st.color : "#e2e8f0"}`, color: item.status === st.id ? st.color : "#64748b", borderRadius: 8, padding: mob ? "7px 4px" : "8px 6px", cursor: "pointer", fontWeight: item.status === st.id ? 700 : 400, fontSize: mob ? 10 : 11, fontFamily: "'Inter',sans-serif", transition: "all 0.12s" }}>
                  {st.label}
                </button>
              ))}
            </div>

            {/* Note toggle */}
            {item.status && item.status !== "" && (
              <div style={{ marginTop: 8 }}>
                {noteIdx === i
                  ? <input autoFocus style={{ ...inpStyle, fontSize: 12 }} value={item.note} onChange={e => setItemNote(i, e.target.value)} placeholder="Observación (opcional)..." onBlur={() => setNoteIdx(null)} />
                  : <button onClick={() => setNoteIdx(i)} style={{ background: "transparent", border: "none", color: "#64748b", fontSize: 11, cursor: "pointer", padding: "2px 0" }}>
                      {item.note ? `📝 ${item.note}` : "+ Agregar observación"}
                    </button>
                }
              </div>
            )}
          </div>
        ))}
      </div>

      {/* General note */}
      <div style={{ background: "#fff", borderRadius: 10, padding: 16, marginTop: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
        <label style={lblStyle}>Observación general de la inspección</label>
        <textarea style={{ ...inpStyle, height: 72, resize: "vertical" }} value={insp.generalNote} onChange={e => setInsp(p => ({ ...p, generalNote: e.target.value }))} placeholder="Notas generales, contexto, condiciones especiales..." />
      </div>

      <button onClick={() => onSave(insp)} style={{ ...btnPri(mob), width: "100%", marginTop: 14, padding: 14, fontSize: 14, justifyContent: "center", display: "flex", alignItems: "center", gap: 8 }} disabled={answered === 0}>
        💾 Guardar Inspección ({answered}/{insp.items.length} completados)
      </button>
    </div>
  );
}

function InspCard({ insp, onSelect, onPrint }) {
  const z    = ZONES.find(x => x.id === insp.zoneId);
  const freq = FREQUENCIES.find(f => f.id === insp.frequency);
  const bien = insp.items.filter(i => i.status === "bien").length;
  const aten = insp.items.filter(i => i.status === "atencion").length;
  const mal  = insp.items.filter(i => i.status === "mal").length;
  const total = insp.items.filter(i => i.status && i.status !== "na").length;
  const score = total > 0 ? Math.round((bien / total) * 100) : 0;
  const scoreColor = score >= 80 ? "#059669" : score >= 50 ? "#d97706" : "#dc2626";

  return (
    <div style={{ background: "#fff", borderRadius: 10, padding: 16, marginBottom: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${z?.color}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 14 }}>{z?.icon} {z?.label}</div>
          <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>{freq?.label} · {insp.date} · {insp.inspector}</div>
        </div>
        <div style={{ fontWeight: 700, fontSize: 22, color: scoreColor }}>{score}%</div>
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 10, fontSize: 12 }}>
        <span style={{ color: "#059669", fontWeight: 600 }}>✅ {bien}</span>
        <span style={{ color: "#d97706", fontWeight: 600 }}>⚠️ {aten}</span>
        <span style={{ color: "#dc2626", fontWeight: 600 }}>❌ {mal}</span>
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
        <button onClick={onSelect} style={{ ...btnSec(true), flex: 1, fontSize: 12 }}>Ver detalle</button>
        <button onClick={() => onPrint(insp)} style={{ ...btnSec(true), fontSize: 12 }}>🖨️</button>
      </div>
    </div>
  );
}

/* ─── VENDORS VIEW ─── */
function VendorsView({ vendors, setVendors, reports, showNew, setShowNew, mob }) {
  const [search, setSearch]       = useState("");
  const [filterCat, setFilterCat] = useState("all");
  const [editVendor, setEditVendor] = useState(null);

  const filtered = vendors.filter(v =>
    (filterCat === "all" || v.category === filterCat) &&
    (search === "" || v.name.toLowerCase().includes(search.toLowerCase()) ||
     (v.contact || "").toLowerCase().includes(search.toLowerCase()))
  );

  return (
    <div>
      {/* Search + filter bar */}
      <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
        <input
          style={{ ...inpStyle, flex: 2, minWidth: 180 }}
          placeholder="🔍  Buscar por nombre o contacto..."
          value={search} onChange={e => setSearch(e.target.value)}
        />
        <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{ ...selStyle, flex: 1, minWidth: 160 }}>
          <option value="all">Todas las especialidades</option>
          {VENDOR_CATS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
        </select>
        <div style={{ color: "#64748b", fontSize: 12, alignSelf: "center", whiteSpace: "nowrap" }}>
          {filtered.length} proveedor{filtered.length !== 1 ? "es" : ""}
        </div>
      </div>

      {/* Category summary pills */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>

        })}

            {filtered.map(v => {
              const c = vcat(v.category);
              const activeJobs = reports.filter(r => r.vendor === v.name && r.status !== "listo").length;
              const doneJobs   = reports.filter(r => r.vendor === v.name && r.status === "listo").length;
              return (
                <div key={v.id} style={{ background: "#fff", borderRadius: 12, boxShadow: "0 1px 6px rgba(0,0,0,0.07)", borderTop: `4px solid ${c.color}`, overflow: "hidden" }}>
                  {/* Header */}
                  <div style={{ padding: "16px 18px 12px", borderBottom: "1px solid #f0f4f8" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 15, color: "#0f172a" }}>{v.name}</div>
                        <div style={{ marginTop: 5 }}>
                          <span style={{ background: c.color + "18", color: c.color, border: `1px solid ${c.color}33`, borderRadius: 8, padding: "3px 9px", fontSize: 11, fontWeight: 600 }}>
                            {c.icon} {c.label}
                          </span>
                        </div>
                      </div>
                      <span style={{ fontSize: 28, flexShrink: 0 }}>{c.icon}</span>
                    </div>
                  </div>

                  {/* Info */}
                  <div style={{ padding: "12px 18px", display: "flex", flexDirection: "column", gap: 7 }}>
                    {v.contact && <div style={{ fontSize: 13, color: "#475569", display: "flex", alignItems: "center", gap: 6 }}>👤 <span style={{ fontWeight: 600 }}>{v.contact}</span></div>}
                    <div style={{ fontSize: 13, color: "#475569" }}>📞 {v.phone}</div>
                    {v.email && <div style={{ fontSize: 12, color: "#2563eb" }}>✉️ {v.email}</div>}
                    {v.nit && <div style={{ fontSize: 11, color: "#64748b" }}>NIT: {v.nit}</div>}
                    {v.notes && <div style={{ fontSize: 12, color: "#94a3b8", fontStyle: "italic", background: "#f8fafc", borderRadius: 8, padding: "6px 10px", marginTop: 2 }}>📝 {v.notes}</div>}
                  </div>

                  {/* Stats + actions */}
                  <div style={{ padding: "10px 18px 14px", borderTop: "1px solid #f0f4f8", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                    <div>
                      <Stars n={v.rating} />
                      <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>
                        <span style={{ color: activeJobs > 0 ? "#2563eb" : "#64748b", fontWeight: activeJobs > 0 ? 700 : 400 }}>{activeJobs} activo{activeJobs !== 1 ? "s" : ""}</span>
                        {" · "}{doneJobs} completado{doneJobs !== 1 ? "s" : ""}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => setEditVendor(v)} style={{ background: "transparent", border: "1px solid #e2e8f0", borderRadius: 8, padding: "6px 11px", cursor: "pointer", fontSize: 12, color: "#475569" }}>✏️ Editar</button>
                      <button onClick={() => { if (window.confirm(`¿Eliminar a ${v.name}?`)) setVendors(p => p.filter(x => x.id !== v.id)); }} style={{ background: "transparent", border: "1px solid #fee2e2", borderRadius: 8, padding: "6px 11px", cursor: "pointer", fontSize: 12, color: "#dc2626" }}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
      }

      {showNew && <VendorModal onClose={() => setShowNew(false)} onSave={v => { setVendors(p => [...p, { ...v, id: Date.now() }]); setShowNew(false); }} mob={mob} />}
      {editVendor && <VendorModal vendor={editVendor} onClose={() => setEditVendor(null)} onSave={updated => { setVendors(p => p.map(x => x.id === updated.id ? updated : x)); setEditVendor(null); }} mob={mob} />}
    </div>
  );
}

/* ─── RESIDENT REPORT FORM ─── */
function ResidentReportForm({ user, onSave }) {

    <div style={{ background: "#fff", borderRadius: 12, padding: 22, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
      <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 18 }}>Radicar Nuevo Reporte</div>

        <FSel label="Urgencia" editing value={form.priority} onChange={v => f("priority", v)} opts={PRIORITIES.map(p => ({ v: p.id, l: p.label }))} />
      </div>
      <FInp label="Teléfono de contacto" editing value={form.reporterPhone} onChange={v => f("reporterPhone", v)} placeholder="Tu número" />
      <FTxt label="Descripción detallada *" editing value={form.description} onChange={v => f("description", v)} placeholder={form.category === "objetos" ? "Describe el objeto: color, tamaño, marca, características..." : "Explica el problema con el mayor detalle posible..."} />

      {form.category === "objetos" && (
        <div style={{ background: "#f3f0ff", border: "1px solid #8b5cf644", borderRadius: 8, padding: 14, marginBottom: 12 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#8b5cf6", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10 }}>🔍 Datos del Objeto</div>
          <FInp label="¿Dónde fue encontrado?" editing value={form.lugarObjeto || ""} onChange={v => f("lugarObjeto", v)} placeholder="Ej: Lobby, Salón comunal, Piscina..." />
          <FInp label="¿Quién lo tiene actualmente?" editing value={form.custodioObjeto || ""} onChange={v => f("custodioObjeto", v)} placeholder="Ej: Portería, Administración, Apto 301..." />
        </div>
      )}
      <div style={{ marginBottom: 12 }}>
        <label style={lblStyle}>Fotos del problema</label>
        <div onClick={() => fileRef.current.click()} style={{ border: "2px dashed #d1d5db", borderRadius: 8, padding: 16, textAlign: "center", cursor: "pointer", color: "#64748b", fontSize: 13 }}>📷 Adjuntar imágenes</div>
        <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleImages} style={{ display: "none" }} />
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 8 }}>
          {form.images.map((img, i) => <img key={i} src={img.data} alt="" style={{ width: 80, height: 60, objectFit: "cover", borderRadius: 8, border: "1px solid #e2e8f0" }} />)}

      </div>
      <button onClick={() => { if (!form.title || !form.description) { alert("Completa título y descripción"); return; } onSave(form); setSaved(true); }}

        Enviar Reporte →
      </button>

  );

              ))}
            </div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}>
          <button onClick={onClose} style={btnSec(mob)}>Cancelar</button>
          <button onClick={() => { if (!form.name || !form.phone) { alert("Nombre y teléfono son obligatorios"); return; } onSave(form); }} style={btnPri(mob)}>
            {isEdit ? "💾 Guardar cambios" : "✅ Agregar proveedor"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── RESIDENTES VIEW ─── */
function ResidentesView({ residents, setResidents, reports, comprobantes, setComprobantes, showNew, setShowNew, mob }) {
  const [search, setSearch]         = useState("");
  const [filterTipo, setFT]         = useState("all");
  const [filterPiso, setFP]         = useState("all");
  const [editResident, setEdit]     = useState(null);
  const [confirmDel, setConfirm]    = useState(null);
  const [perfilResident, setPerfil] = useState(null);

  if (perfilResident) {
    const updated = residents.find(r => (r._docId || r.id) === (perfilResident._docId || perfilResident.id)) || perfilResident;
    return <ResidentePerfil resident={updated} comprobantes={comprobantes.filter(c => c.apt === updated.apt)} setComprobantes={setComprobantes} reports={reports.filter(r => r.apt === updated.apt)} onBack={() => setPerfil(null)} mob={mob} />;
  }

  const TIPOS = [
    { id: "propietario",   label: "Propietario",   color: "#0f172a", bg: "#f0f4f8", icon: "🏠" },
    { id: "arrendatario",  label: "Arrendatario",  color: "#2563eb", bg: "#eff6ff", icon: "🔑" },
    { id: "familiar",      label: "Familiar",       color: "#7c3aed", bg: "#f5f3ff", icon: "👨‍👩‍👧" },
  ];
  const ESTADOS = [
    { id: "activo",   label: "Activo",   color: "#059669", bg: "#f0fdf4" },
    { id: "inactivo", label: "Inactivo", color: "#9ca3af", bg: "#f9fafb" },
  ];
  const tipoObj  = (id) => TIPOS.find(t => t.id === id)   || TIPOS[0];
  const estadoObj= (id) => ESTADOS.find(e => e.id === id) || ESTADOS[0];

  // Pisos únicos de los apartamentos registrados
  const pisos = [...new Set(residents.map(r => r.piso).filter(Boolean))].sort();

  const filtered = residents.filter(r => {
    const q = search.toLowerCase();
    const matchQ = !q || r.nombre?.toLowerCase().includes(q) || r.apt?.toLowerCase().includes(q) || r.email?.toLowerCase().includes(q) || r.telefono?.toLowerCase().includes(q);
    const matchTipo = filterTipo === "all" || r.tipo === filterTipo;
    const matchPiso = filterPiso === "all" || r.piso === filterPiso;
    return matchQ && matchTipo && matchPiso;
  }).sort((a,b) => (a.apt||"").localeCompare(b.apt||"", undefined, { numeric: true }));

  const repsByApt = (apt) => reports.filter(r => r.apt === apt).length;

  const exportExcel = () => {
    const data = residents.map(r => ({
      "Apartamento": r.apt, "Piso": r.piso, "Nombre": r.nombre,
      "Tipo": tipoObj(r.tipo).label, "Estado": estadoObj(r.estado).label,
      "Teléfono": r.telefono, "Email": r.email,
      "Teléfono 2": r.telefono2 || "", "Vehículo": r.vehiculo || "",
      "Placa": r.placa || "", "Parqueadero": r.parqueadero || "",
      "Mascotas": r.mascotas || "", "Notas": r.notas || "",
      "Fecha ingreso": r.fechaIngreso || "",
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [8,4,24,14,10,14,26,14,14,10,14,16,30,14].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Residentes");
    XLSX.writeFile(wb, `residentes_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const handleSave = async (form) => {
    if (form._docId) {
      setResidents(p => p.map(r => r._docId === form._docId ? form : r));
    } else {
      setResidents(p => [...p, { ...form, id: Date.now() }]);
    }
    setShowNew(false); setEdit(null);
  };

  const handleDelete = async (res) => {
    setResidents(p => p.filter(r => r._docId !== res._docId));
    setConfirm(null);
  };

  const statsActivos  = residents.filter(r => r.estado === "activo").length;
  const statsProps    = residents.filter(r => r.tipo === "propietario").length;
  const statsArren    = residents.filter(r => r.tipo === "arrendatario").length;

  return (
    <div>
      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr 1fr" : "repeat(4,1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "Total",        value: residents.length, icon: "👥", color: "#0f172a" },
          { label: "Activos",      value: statsActivos,     icon: "✅", color: "#059669" },
          { label: "Propietarios", value: statsProps,       icon: "🏠", color: "#d97706" },
          { label: "Arrendatarios",value: statsArren,       icon: "🔑", color: "#2563eb" },
        ].map(s => (
          <div key={s.label} style={{ background: "#fff", borderRadius: 10, padding: mob ? "14px 12px" : "16px 18px", borderLeft: `3px solid ${s.color}`, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize: mob ? 18 : 20 }}>{s.icon}</div>
            <div style={{ fontSize: mob ? 26 : 30, fontWeight: 700, color: s.color, lineHeight: 1.1, marginTop: 4 }}>{s.value}</div>
            <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Toolbar */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Buscar nombre, apto, email..." style={{ ...inpStyle, flex: 1, minWidth: 180, maxWidth: 300, marginBottom: 0 }} />
        <select value={filterTipo} onChange={e => setFT(e.target.value)} style={selStyle}>
          <option value="all">Todos los tipos</option>
          {TIPOS.map(t => <option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
        </select>
        {pisos.length > 0 && (
          <select value={filterPiso} onChange={e => setFP(e.target.value)} style={selStyle}>
            <option value="all">Todos los pisos</option>
            {pisos.map(p => <option key={p} value={p}>Piso {p}</option>)}
          </select>
        )}
        <button onClick={exportExcel} style={btnSec(mob)}>📥 Excel</button>
        <div style={{ color: "#64748b", fontSize: 12, marginLeft: "auto" }}>{filtered.length} residente{filtered.length !== 1 ? "s" : ""}</div>
      </div>

      {mob ? (
        /* MOBILE: Cards */
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.length === 0 && <div style={{ textAlign: "center", color: "#64748b", padding: 40 }}>Sin residentes registrados</div>}
          {filtered.map(r => {
            const t = tipoObj(r.tipo); const e = estadoObj(r.estado);
            return (
              <div key={r._docId || r.id} style={{ background: "#fff", borderRadius: 10, padding: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: `4px solid ${t.color}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>Apto {r.apt}</div>
                    <div style={{ fontSize: 13, color: "#0f172a", marginTop: 2 }}>{r.nombre}</div>
                  </div>
                  <span style={{ background: e.bg, color: e.color, border: `1px solid ${e.color}55`, borderRadius: 20, padding: "3px 10px", fontSize: 10, fontWeight: 700 }}>{e.label}</span>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                  <span style={{ background: t.bg, color: t.color, border: `1px solid ${t.color}33`, borderRadius: 8, padding: "3px 8px", fontSize: 11, fontWeight: 600 }}>{t.icon} {t.label}</span>
                  {repsByApt(r.apt) > 0 && <span style={{ background: "#f8fafc", color: "#d97706", border: "1px solid #d9770633", borderRadius: 8, padding: "3px 8px", fontSize: 11 }}>📋 {repsByApt(r.apt)} reporte{repsByApt(r.apt) > 1 ? "s" : ""}</span>}
                </div>
                {r.telefono && <div style={{ fontSize: 12, color: "#64748b", marginTop: 6 }}>📞 {r.telefono}</div>}
                {r.email    && <div style={{ fontSize: 12, color: "#2563eb", marginTop: 2 }}>✉️ {r.email}</div>}
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <button onClick={() => setPerfil(r)} style={{ ...btnPri(mob), flex: 1, textAlign: "center", background: "#059669" }}>👁️ Ver perfil</button>
                  <button onClick={() => setEdit(r)} style={{ ...btnSec(mob) }}>✏️</button>
                  <button onClick={() => setConfirm(r)} style={{ background: "#fef2f2", color: "#dc2626", border: "1px solid #dc262633", borderRadius: 8, padding: "8px 14px", fontSize: 12, cursor: "pointer", fontFamily: "'Inter',sans-serif" }}>🗑️</button>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        /* DESKTOP: Table */
        <div style={{ background: "#fff", borderRadius: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0" }}>
                {["Apto","Piso","Nombre","Tipo","Teléfono","Email","Vehículo/Placa","Estado","Reportes",""].map(h => (
                  <th key={h} style={{ padding: "11px 13px", textAlign: "left", fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 && <tr><td colSpan={10} style={{ textAlign: "center", padding: 40, color: "#64748b", fontSize: 13 }}>Sin residentes registrados. Haz clic en "+ Residente" para agregar.</td></tr>}
              {filtered.map(r => {
                const t = tipoObj(r.tipo); const e = estadoObj(r.estado);
                const nReps = repsByApt(r.apt);
                return (
                  <tr key={r._docId || r.id} style={{ borderBottom: "1px solid #f0f4f8" }}
                    onMouseEnter={ev => ev.currentTarget.style.background = "#f8fafc"}
                    onMouseLeave={ev => ev.currentTarget.style.background = ""}>
                    <td style={{ padding: "10px 13px", fontWeight: 700, fontSize: 14 }}>{r.apt}</td>
                    <td style={{ padding: "10px 13px", fontSize: 13, color: "#64748b" }}>{r.piso || "—"}</td>
                    <td style={{ padding: "10px 13px", fontWeight: 600, fontSize: 13 }}>{r.nombre}</td>
                    <td style={{ padding: "10px 13px" }}>
                      <span style={{ background: t.bg, color: t.color, border: `1px solid ${t.color}33`, borderRadius: 8, padding: "3px 9px", fontSize: 11, fontWeight: 600 }}>{t.icon} {t.label}</span>
                    </td>
                    <td style={{ padding: "10px 13px", fontSize: 13 }}>{r.telefono || "—"}</td>
                    <td style={{ padding: "10px 13px", fontSize: 12, color: r.email ? "#2563eb" : "#d1d5db" }}>{r.email || "—"}</td>
                    <td style={{ padding: "10px 13px", fontSize: 12 }}>{r.vehiculo ? `${r.vehiculo} · ${r.placa || ""}` : "—"}</td>
                    <td style={{ padding: "10px 13px" }}>
                      <span style={{ background: e.bg, color: e.color, border: `1px solid ${e.color}55`, borderRadius: 20, padding: "3px 10px", fontSize: 11, fontWeight: 700 }}>{e.label}</span>
                    </td>
                    <td style={{ padding: "10px 13px" }}>
                      {nReps > 0
                        ? <span style={{ background: "#f8fafc", color: "#d97706", borderRadius: 20, padding: "3px 10px", fontSize: 11, fontWeight: 700 }}>📋 {nReps}</span>
                        : <span style={{ color: "#d1d5db", fontSize: 12 }}>—</span>}
                    </td>
                    <td style={{ padding: "10px 13px" }}>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => setPerfil(r)} style={{ background: "#f0fdf4", border: "1px solid #05966933", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#059669", fontFamily: "'Inter',sans-serif" }}>👁️</button>
                        <button onClick={() => setEdit(r)} style={{ background: "#f0f4f8", border: "1px solid #e2e8f0", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#475569", fontFamily: "'Inter',sans-serif" }}>✏️</button>
                        <button onClick={() => setConfirm(r)} style={{ background: "#fef2f2", border: "1px solid #dc262633", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#dc2626", fontFamily: "'Inter',sans-serif" }}>🗑️</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Modals */}
      {(showNew || editResident) && (
        <ResidenteModal
          resident={editResident}
          onClose={() => { setShowNew(false); setEdit(null); }}
          onSave={handleSave}
          mob={mob}
        />
      )}
      {confirmDel && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 300, padding: 16 }}>
          <div style={{ background: "#fff", borderRadius: 14, padding: 28, maxWidth: 380, width: "100%", boxShadow: "0 24px 60px rgba(0,0,0,0.25)" }}>
            <div style={{ fontSize: 36, textAlign: "center", marginBottom: 12 }}>🗑️</div>
            <div style={{ fontWeight: 700, fontSize: 16, textAlign: "center", marginBottom: 8 }}>¿Eliminar residente?</div>
            <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", marginBottom: 20 }}>Se eliminará a <strong>{confirmDel.nombre}</strong> (Apto {confirmDel.apt}). Esta acción no se puede deshacer.</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setConfirm(null)} style={{ ...btnSec(mob), flex: 1 }}>Cancelar</button>
              <button onClick={() => handleDelete(confirmDel)} style={{ flex: 1, background: "#dc2626", color: "#fff", border: "none", borderRadius: 8, padding: "10px", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "'Inter',sans-serif" }}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
